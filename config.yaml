site_name: "Lakshit's Corner"
author: "you"
base_url: "you.com"

theme:
  default: "coffee"
  include:
    - "hacktoberfest25"
    - "dracula"
    - "coffee"
    - "gaa"
  custom:
    hacktoberfest25: |
      /* Raw CSS Theme */
      prefers-dark: true;
      color-scheme: dark;
      --color-base-100: #1C1C3F;
      --color-base-200: #403F7D;
      --color-base-300: #5E577C;
      --color-base-content: oklch(1.000 0.000 0.0);
      --color-primary: #A0A0FF;
      --color-primary-content: #1C1C3F;
      --color-secondary: #5A5AB5;
      --color-secondary-content: #FFFFFF;
      --color-accent: #C2C2FF;
      --color-accent-content: #1C1C3F;
      --color-neutral: #403F7D;
      --color-neutral-content: #FFFFFF;
      --color-info: oklch(88% 0.059 254.128);
      --color-info-content: oklch(29% 0.066 243.157);
      --color-success: oklch(77% 0.152 181.912);
      --color-success-content: oklch(27% 0.046 192.524);
      --color-warning: #fbbd23;
      --color-warning-content: oklch(28% 0.066 53.813);
      --color-error: #f87272;
      --color-error-content: oklch(25% 0.092 26.042);
      --radius-selector: 2rem;
      --radius-field: 1rem;
      --radius-box: 1rem;
      --size-selector: 0.28125rem;
      --size-field: 0.25rem;
      --border: 1px;
      --depth: 0;
      --noise: 1;
    gaa: |
      /* Raw CSS Theme */
      prefersdark: false;
      color-scheme: "light";
      --color-base-100: oklch(91.637% 0.034 90.515);
      --color-base-200: oklch(88.272% 0.049 91.774);
      --color-base-300: oklch(84.133% 0.065 90.856);
      --color-base-content: oklch(50% 0.213 27.518);
      --color-primary: oklch(64% 0.222 41.116);
      --color-primary-content: oklch(97% 0.013 17.38);
      --color-secondary: oklch(92% 0.084 155.995);
      --color-secondary-content: oklch(44% 0.119 151.328);
      --color-accent: oklch(68% 0.162 75.834);
      --color-accent-content: oklch(41% 0.112 45.904);
      --color-neutral: oklch(44% 0.011 73.639);
      --color-neutral-content: oklch(86% 0.005 56.366);
      --color-info: oklch(58% 0.158 241.966);
      --color-info-content: oklch(96% 0.059 95.617);
      --color-success: oklch(51% 0.096 186.391);
      --color-success-content: oklch(96% 0.059 95.617);
      --color-warning: oklch(64% 0.222 41.116);
      --color-warning-content: oklch(96% 0.059 95.617);
      --color-error: oklch(70% 0.191 22.216);
      --color-error-content: oklch(40% 0.123 38.172);
      --radius-selector: 0.25rem;
      --radius-field: 0.25rem;
      --radius-box: 1rem;
      --size-selector: 0.25rem;
      --size-field: 0.25rem;
      --border: 1px;
      --depth: 1;
      --noise: 0;


fonts:
  imports:
    - "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
  families:
    body: "'Inter', sans-serif"
    heading: "'Space Grotesk', sans-serif"
    mono: "'JetBrains Mono', monospace"

syntax:
  pygments_theme: "dracula"

markdown:
  extensions:
    - fenced_code
    - codehilite
    - footnotes
    - tables
    - attr_list
    - sane_lists
    - md_in_html
    - nl2br
    - toc:
        permalink: true

images:
  formats:
    - webp
    - jpg


navigation:
  - name: "Home"
    url: "/"
  - name: "Blog"
    url: "/blog/"
  - name: "Pictures"
    url: "/pics/"
  - name: "Contact"
    url: "/#section3"

lastfm_api_key: "5f7ae3b17413db14e81ed1423684db51"
lastfm_user: "talrejalakshit"
